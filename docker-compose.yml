services:
  mongodb:
    image: mongo:latest
    container_name: ezconvert_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  bot:
    build: .
    container_name: ezconvert_bot
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - .env
    volumes:
      - ./downloads:/app/bot/downloads
      - ./temp_files:/app/bot/temp_files
    environment:
      - MONGO_URL=${MONGO_URL}   # берётся из .env
      - BOT_TOKEN=${BOT_TOKEN}   # берётся из .env

volumes:
  mongodb_data: